name: Launcher

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: launcher-release
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and release launchers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build all launcher binaries
        run: |
          TARGETS="bun-linux-x64 bun-linux-arm64 bun-darwin-arm64 bun-darwin-x64"
          for TARGET in $TARGETS; do
            SUFFIX="${TARGET#bun-}"
            ARTIFACT="bkd-launcher-${SUFFIX}"
            echo "--- Building ${ARTIFACT} ---"
            bun scripts/compile.ts --mode launcher --target "${TARGET}" --outfile "${ARTIFACT}"
            ls -lh "dist/${ARTIFACT}"
          done
          # Generate combined checksums
          cd dist
          sha256sum bkd-launcher-* > checksums.txt
          echo "--- Checksums ---"
          cat checksums.txt

      - name: Get commit info
        id: info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create or update launcher release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          SHA_SHORT: ${{ steps.info.outputs.sha_short }}
          BUILD_DATE: ${{ steps.info.outputs.date }}
        run: |
          TAG="launcher-v1"
          # Delete existing release if it exists (to recreate with new assets)
          gh release delete "${TAG}" --yes 2>/dev/null || true
          # Pin tag to the exact commit that triggered this workflow
          git tag -f "${TAG}" "${COMMIT_SHA}"
          git push origin "refs/tags/${TAG}" --force
          # Create new release with updated assets
          gh release create "${TAG}" dist/bkd-launcher-* dist/checksums.txt \
            --target "${COMMIT_SHA}" \
            --title "Launcher v1 (${BUILD_DATE})" \
            --notes "$(cat <<NOTES
          ## Launcher Binaries

          One-time download for package-mode deployments. The launcher binary (~90 MB)
          loads app code from \`data/app/v{version}/server.js\` at startup.

          First-time run auto-downloads the latest app package from GitHub releases.
          Subsequent updates only require the app package (~1 MB).

          **Built from:** \`${SHA_SHORT}\` on ${BUILD_DATE}

          ### Manual Setup

          \`\`\`bash
          # 1. Download launcher for your platform
          chmod +x bkd-launcher-linux-x64

          # 2. Run — auto-downloads the latest app package
          ./bkd-launcher-linux-x64
          \`\`\`
          NOTES
          )" \
            --prerelease
